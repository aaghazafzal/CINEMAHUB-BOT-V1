    <!-- Favicon -->

    <!-- Core SEO -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>CinemaHub | Unlimited Premium File Streaming</title>
    <meta name="description" content="CinemaHub is the ultimate platform. Convert your Telegram files to high-speed streamable, shareable web links with unlimited bandwidth." />

    <meta property="og:title" content="CinemaHub | 10M+ Database & Premium Streaming" />

    <meta property="og:image" content="/logo.png" />
    <meta property="og:site_name" content="CinemaHub" />

    <script>
      // Jinja payload injected by the streaming server
      window.__PRELOADED_STATE__ = {% if file_name %}{
        file_name: `{{file_name}}`,
        direct_dl_link: `{{file_url}}`,
        file_size: `{{file_size}}`,
        vlc_player_link_pc: `vlc://{{file_url}}`
      }{% else %}null{% endif %};
    </script>

    <!-- Technical SEO -->
    <link rel="canonical" href="https://cinemahub-bot.onrender.com/" />
    
    <!-- JSON-LD for Search Engines -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "CinemaHub",
      "operatingSystem": "Web, Android, iOS",
      "applicationCategory": "MultimediaApplication",

      },

        "@type": "Organization",

      }
    }
